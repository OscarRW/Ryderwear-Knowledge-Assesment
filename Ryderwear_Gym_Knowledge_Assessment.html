<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ryderwear Gym — Team Knowledge Assessment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f1f3f5;
    --txt: #111827; --txt2: #6b7280; --txt3: #9ca3af;
    --bdr: #e5e7eb; --bdr2: #d1d5db;
    --success-bg: #f0fdf4; --success-txt: #16a34a; --success-bdr: #86efac;
    --warn-bg: #fffbeb; --warn-txt: #d97706; --warn-bdr: #fcd34d;
    --info-bg: #eff6ff; --info-txt: #2563eb; --info-bdr: #93c5fd;
    --danger-bg: #fef2f2; --danger-txt: #dc2626; --danger-bdr: #fca5a5;
    --radius: 8px; --radius-sm: 5px;
    --star-on: #f59e0b; --star-off: #d1d5db;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg3); color: var(--txt); line-height: 1.5;
    min-height: 100vh;
  }
  #wrap { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* INPUTS */
  input[type=text], input[type=date], select, textarea {
    font-family: inherit; font-size: 13.5px; color: var(--txt);
    background: var(--bg); border: 1px solid var(--bdr2);
    border-radius: var(--radius-sm); padding: 8px 10px;
    outline: none; transition: border-color .15s;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus, textarea:focus {
    border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,.12);
  }
  textarea { resize: vertical; }
  select { cursor: pointer; }

  /* BUTTONS */
  button {
    font-family: inherit; font-size: 13px; cursor: pointer;
    border: 1px solid var(--bdr2); border-radius: var(--radius-sm);
    padding: 7px 16px; background: var(--bg); color: var(--txt);
    transition: background .15s, border-color .15s;
  }
  button:hover { background: var(--bg2); }
  .btn-primary {
    background: #111827; color: #fff; border-color: #111827; font-weight: 500;
  }
  .btn-primary:hover { background: #1f2937; }
  .btn-success {
    background: var(--success-bg); color: var(--success-txt);
    border-color: var(--success-bdr); font-weight: 500;
  }
  .btn-success:hover { background: #dcfce7; }
  .btn-info {
    background: var(--info-bg); color: var(--info-txt);
    border-color: var(--info-bdr); font-weight: 500;
  }
  .btn-info:hover { background: #dbeafe; }

  /* CARDS */
  .card {
    background: var(--bg); border: 1px solid var(--bdr);
    border-radius: var(--radius); overflow: hidden;
    margin-bottom: 1rem;
  }
  .card-hdr {
    background: #1a1a1a; padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-hdr h2 { font-size: 15px; font-weight: 500; color: #fff; margin: 0; }
  .card-hdr-mgr { background: #2d1b69; }
  .card-note {
    padding: 6px 16px; background: var(--bg2);
    border-bottom: 1px solid var(--bdr);
    font-size: 11px; color: var(--txt2); font-style: italic;
  }
  .q-row {
    padding: .875rem 1.25rem;
    border-bottom: 1px solid var(--bdr);
  }
  .q-row:last-child { border-bottom: none; }
  .q-text { font-size: 13.5px; color: var(--txt); margin-bottom: 2px; }
  .q-num { font-size: 12px; color: var(--txt2); }

  /* STARS */
  .star-row { display: flex; align-items: center; gap: 3px; margin: 5px 0; }
  .star {
    font-size: 24px; cursor: pointer; line-height: 1;
    user-select: none; color: var(--star-off);
    transition: color .1s, transform .1s;
  }
  .star:hover { transform: scale(1.15); }
  .star.on { color: var(--star-on); }
  .star-lbl { font-size: 11px; color: var(--txt2); margin-left: 6px; }

  /* LOGO BAR */
  .logo-bar {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: .875rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--bdr);
  }
  .logo-bar img { height: 44px; object-fit: contain; }
  .logo-bar-text { font-size: 18px; font-weight: 600; color: var(--txt); }
  .logo-bar-sub { font-size: 10px; color: var(--txt2); letter-spacing: .1em; text-transform: uppercase; }

  /* SUMMARY CARDS */
  .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .summary-card { border-radius: var(--radius); padding: .875rem; text-align: center; }
  .summary-card p:first-child { font-size: 11px; margin-bottom: 3px; }
  .summary-card p:last-child { font-size: 24px; font-weight: 600; }

  /* ACTION ITEMS */
  .action-item {
    background: var(--bg); border: 1px solid var(--bdr);
    border-radius: var(--radius); padding: .875rem 1.25rem;
    margin-bottom: .625rem;
  }
  .action-badges { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }
  .badge { font-size: 10px; border-radius: 4px; padding: 2px 8px; font-weight: 600; }
  .badge-1 { background: var(--danger-bg); color: var(--danger-txt); }
  .badge-2, .badge-3 { background: var(--warn-bg); color: var(--warn-txt); }
  .badge-4 { background: var(--info-bg); color: var(--info-txt); }
  .action-sec { font-size: 10px; color: var(--txt2); text-transform: uppercase; letter-spacing: .05em; }
  .action-q { font-size: 13.5px; color: var(--txt); margin-top: 1px; }
  .action-note { font-size: 12px; color: var(--txt2); font-style: italic; margin-top: 4px; }

  /* INFO BAR */
  .info-bar {
    background: var(--bg2); border: 1px solid var(--bdr);
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-size: 13px; color: var(--txt2);
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 1rem;
  }
  .info-bar strong { color: var(--txt); }

  /* LEGEND */
  .legend {
    background: var(--bg); border: 1px solid var(--bdr);
    border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 1rem;
  }
  .legend-title { font-size: 12px; font-weight: 600; color: var(--txt); margin-bottom: 6px; }
  .legend-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 12px; font-size: 11px; color: var(--txt2); }
  .legend-grid span .s { color: var(--star-on); }

  /* FORM GRID */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group label { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; }

  /* SIG CANVAS */
  .sig-canvas {
    display: block; width: 100%; height: 110px;
    cursor: crosshair; touch-action: none;
    background: var(--bg); border: 1px solid var(--bdr2);
    border-radius: var(--radius-sm);
  }

  /* UTILS */
  .flex-between { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .flex-end { display: flex; justify-content: flex-end; gap: 8px; }
  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .sig-label { font-size: 12px; color: var(--txt2); display: block; margin-bottom: 5px; }
  .sig-label strong { color: var(--txt); }
  .section-badge { font-size: 10px; background: rgba(255,255,255,.2); color: rgba(255,255,255,.9); border-radius: 4px; padding: 2px 8px; }
  .comments-box {
    background: var(--bg); border: 1px solid var(--bdr);
    border-radius: var(--radius); padding: 1.25rem;
    margin-top: 1.5rem; margin-bottom: 1.5rem;
  }
  .comments-box h2 { font-size: 15px; font-weight: 600; color: var(--txt); margin-bottom: .375rem; }
  .comments-box p { font-size: 12px; color: var(--txt2); margin-bottom: .875rem; }
  .comments-box textarea { width: 100%; font-size: 13px; }
  h1.page-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: var(--txt); }
  h2.section-title { font-size: 15px; font-weight: 600; margin: 0 0 .5rem; color: var(--txt); }
  p.section-sub { font-size: 12px; color: var(--txt2); margin: 0 0 .875rem; }
  .divider { border: none; border-top: 1px solid var(--bdr); margin: 1.5rem 0; }
  .bottom-bar { display: flex; justify-content: space-between; gap: 10px; padding-bottom: 2rem; margin-top: .5rem; }

  @media (max-width: 560px) {
    .form-grid, .legend-grid, .summary-grid, .sig-grid { grid-template-columns: 1fr; }
    .logo-bar-text { font-size: 15px; }
  }
</style>
</head>

let Ph='info',NM='',AS='',GY_='',DT='',AN=AL.map(()=>({s:0,c:''})),AC='',SA=null,SM=null;
const SL=['','Immediate training required','Significant development needed','Some gaps to address','Minor improvements needed','Fully competent'];

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sv(){
  document.querySelectorAll('[data-ci]').forEach(e=>{AN[+e.dataset.ci].c=e.value;});
  const ac=document.getElementById('ac');if(ac)AC=ac.value;
}

function logoBar(){
  return`<div class="logo-bar">
<img src="data:image/jpeg;base64,${LG}" alt="Ryderwear Gym" onerror="this.style.display='none'" />
<div><div class="logo-bar-text">RYDERWEAR GYM</div>
<div class="logo-bar-sub">Team Knowledge Assessment</div></div>
</div>`;
}

function starRow(idx){
  const s=AN[idx].s;
  return`<div class="star-row" data-sb="${idx}">
${[1,2,3,4,5].map(n=>`<span class="star${s>=n?' on':''}" data-si="${idx}" data-n="${n}">&#9733;</span>`).join('')}
<span class="star-lbl">${s?s+'/5 \u2014 '+SL[s]:''}</span>
</div>`;
}

function riInf(){
  return logoBar()+`
<h1 class="page-title">Knowledge Assessment Form</h1>
<div class="card" style="padding:1.25rem 1.25rem .875rem;">
<div class="form-grid">
<div class="form-group"><label>Team member being assessed</label><input type="text" id="rn" placeholder="Full name" value="${esc(NM)}" /></div>
<div class="form-group"><label>Assessor</label><input type="text" id="ra" placeholder="Full name" value="${esc(AS)}" /></div>
<div class="form-group"><label>Gym location</label><select id="rg">
<option value="">Select gym location...</option>
${GY.map(g=>`<option${GY_===g?' selected':''} value="${g}">${g}</option>`).join('')}
</select></div>
<div class="form-group"><label>Assessment date</label><input type="date" id="rd" value="${DT}" /></div>
</div>
</div>
<p style="font-size:12px;color:var(--txt2);margin:.75rem 0;">All fields required before proceeding.</p>
<div class="flex-end"><button class="btn-primary" id="b0" style="font-size:14px;padding:9px 28px;">Begin Assessment &rarr;</button></div>`;
}

function riAs(){
  let h=logoBar();
  h+=`<div class="info-bar"><strong>${esc(NM)}</strong><span style="opacity:.4">|</span>Assessor: ${esc(AS)}<span style="opacity:.4">|</span>${esc(GY_)}<span style="opacity:.4">|</span>${DT}</div>`;
  h+=`<div class="legend"><div class="legend-title">Star rating guide</div>
<div class="legend-grid">
<span><span class="s">&#9733;</span> 1 star &mdash; Immediate training required</span>
<span><span class="s">&#9733;&#9733;&#9733;&#9733;</span> 4 stars &mdash; Minor improvements needed</span>
<span><span class="s">&#9733;&#9733;</span> 2 stars &mdash; Significant development needed</span>
<span><span class="s">&#9733;&#9733;&#9733;&#9733;&#9733;</span> 5 stars &mdash; Fully competent (no action needed)</span>
<span><span class="s">&#9733;&#9733;&#9733;</span> 3 stars &mdash; Some gaps to address</span>
</div></div>`;
  let fi=0;
  SC.forEach(sec=>{
    const mg=sec.t.includes('Managers');
    h+=`<div class="card"><div class="card-hdr${mg?' card-hdr-mgr':''}">
<h2>${esc(sec.t)}</h2>${mg?`<span class="section-badge">Managers &amp; 2IC only</span>`:''}
</div>${sec.note?`<div class="card-note">${esc(sec.note)}</div>`:''}`;
    sec.q.forEach((q,qi)=>{
      const idx=fi++;
      h+=`<div class="q-row"><p class="q-text"><span class="q-num">${qi+1}.&nbsp;</span>${esc(q)}</p>
${starRow(idx)}
<textarea data-ci="${idx}" rows="2" placeholder="Comments / observations..." style="width:100%;font-size:12.5px;margin-top:3px;">${esc(AN[idx].c)}</textarea>
</div>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="bottom-bar"><button id="b1">&larr; Back to info</button>
<button class="btn-success" id="b2" style="font-size:14px;padding:9px 22px;">Complete &amp; view results &rarr;</button></div>`;
  return h;
}

function riRs(){
  const acts=AN.map((a,i)=>({...a,...AL[i]})).filter(a=>a.s>0&&a.s<5).sort((a,b)=>a.s-b.s);
  const comp=AN.filter(a=>a.s===5).length;
  const rated=AN.filter(a=>a.s>0).length;
  const pL={1:'Priority 1 \u2014 Immediate',2:'Priority 2 \u2014 High',3:'Priority 3 \u2014 Medium',4:'Priority 4 \u2014 Low'};
  let h=logoBar();
  h+=`<div class="flex-between" style="margin-bottom:1.25rem;">
<div><h1 style="font-size:20px;font-weight:600;margin:0;">Assessment Results</h1>
<p style="font-size:12px;color:var(--txt2);margin:3px 0 0;">${esc(NM)} &middot; ${esc(GY_)} &middot; ${DT}</p></div>
<div class="flex-end"><button id="b3">&larr; Edit</button><button class="btn-info" id="b4">Download PDF</button></div>
</div>`;
  h+=`<div class="summary-grid">
<div class="summary-card" style="background:var(--bg2);border:1px solid var(--bdr);">
<p style="color:var(--txt2);">Questions rated</p><p style="color:var(--txt);">${rated}/${AL.length}</p></div>
<div class="summary-card" style="background:var(--success-bg);border:1px solid var(--success-bdr);">
<p style="color:var(--success-txt);">Fully competent</p><p style="color:var(--success-txt);">${comp}</p></div>
<div class="summary-card" style="background:var(--warn-bg);border:1px solid var(--warn-bdr);">
<p style="color:var(--warn-txt);">Training needed</p><p style="color:var(--warn-txt);">${acts.length}</p></div>
</div>`;
  if(acts.length>0){
    h+=`<h2 class="section-title">Training Action Plan</h2>
<p class="section-sub">Ordered by priority &mdash; 1 star (most urgent) through to 4 stars.</p>`;
    acts.forEach(a=>{
      const pl=pL[a.s]||`${a.s} stars`;
      const strs='&#9733;'.repeat(a.s)+'&#9734;'.repeat(5-a.s);
      h+=`<div class="action-item"><div class="action-badges">
<span class="badge badge-${a.s}">${pl}</span>
<span style="color:var(--star-on);font-size:14px;">${strs}</span>
</div>
<div class="action-sec">${esc(a.sec)}</div>
<div class="action-q">${esc(a.q)}</div>
${a.c?`<div class="action-note">&ldquo;${esc(a.c)}&rdquo;</div>`:''}
</div>`;
    });
  }else if(rated>0){
    h+=`<div style="background:var(--success-bg);border:1px solid var(--success-bdr);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;">
<p style="color:var(--success-txt);font-size:13px;">All rated areas are fully competent &mdash; no training actions required.</p></div>`;
  }
  h+=`<div class="comments-box">
<h2>Assessor Overall Comments</h2>
<p>Provide a general summary, key strengths, focus areas, and agreed next steps.</p>
<textarea id="ac" rows="6" placeholder="e.g. Overall the team member demonstrated strong product knowledge and PGM skills. Key areas to focus on are contract knowledge and escalation processes. Agreed to revisit within 4 weeks...">${esc(AC)}</textarea>
</div>`;
  h+=`<h2 class="section-title">Signatures</h2>
<p class="section-sub" style="margin-bottom:.875rem;">Both parties sign to confirm this assessment was conducted fairly and results have been discussed.</p>
<div class="sig-grid">
<div><label class="sig-label">Assessor &mdash; <strong>${esc(AS)}</strong></label>
<canvas id="sga" class="sig-canvas"></canvas>
<button class="scc" data-t="a" style="font-size:11px;margin-top:5px;">Clear</button></div>
<div><label class="sig-label">Team member &mdash; <strong>${esc(NM)}</strong></label>
<canvas id="sgm" class="sig-canvas"></canvas>
<button class="scc" data-t="m" style="font-size:11px;margin-top:5px;">Clear</button></div>
</div>`;
  return h;
}

function initSig(id,isA){
  const c=document.getElementById(id);if(!c)return;
  c.width=c.offsetWidth||300;c.height=110;
  const cx=c.getContext('2d');
  cx.strokeStyle='#111';cx.lineWidth=2;cx.lineCap='round';cx.lineJoin='round';
  const sd=isA?SA:SM;
  if(sd){const im=new Image();im.onload=()=>cx.drawImage(im,0,0,c.width,c.height);im.src=sd;}
  let dn=false,lx,ly;
  const gp=e=>{const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(c.width/r.width),y:(s.clientY-r.top)*(c.height/r.height)};};
  const save=()=>{if(isA)SA=c.toDataURL();else SM=c.toDataURL();};
  c.addEventListener('mousedown',e=>{e.preventDefault();dn=true;const p=gp(e);lx=p.x;ly=p.y;cx.beginPath();cx.moveTo(lx,ly);});
  c.addEventListener('mousemove',e=>{if(!dn)return;e.preventDefault();const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke();lx=p.x;ly=p.y;});
  c.addEventListener('mouseup',()=>{if(!dn)return;dn=false;save();});
  c.addEventListener('mouseleave',()=>{if(!dn)return;dn=false;save();});
  c.addEventListener('touchstart',e=>{e.preventDefault();dn=true;const p=gp(e);lx=p.x;ly=p.y;cx.beginPath();cx.moveTo(lx,ly);},{passive:false});
  c.addEventListener('touchmove',e=>{if(!dn)return;e.preventDefault();const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke();lx=p.x;ly=p.y;},{passive:false});
  c.addEventListener('touchend',()=>{dn=false;save();});
}

function bind(){
  document.getElementById('b0')?.addEventListener('click',()=>{
    NM=document.getElementById('rn').value.trim();
    AS=document.getElementById('ra').value.trim();
    GY_=document.getElementById('rg').value;
    DT=document.getElementById('rd').value;
    if(!NM||!AS||!GY_||!DT){alert('Please complete all fields to continue.');return;}
    Ph='assess';render();window.scrollTo(0,0);
  });
  document.getElementById('b1')?.addEventListener('click',()=>{sv();Ph='info';render();window.scrollTo(0,0);});
  document.getElementById('b2')?.addEventListener('click',()=>{sv();Ph='results';render();window.scrollTo(0,0);});
  document.getElementById('b3')?.addEventListener('click',()=>{sv();Ph='assess';render();window.scrollTo(0,0);});
  document.getElementById('b4')?.addEventListener('click',()=>{sv();mkPDF();});
  document.querySelectorAll('[data-si]').forEach(el=>el.addEventListener('click',e=>{
    const i=+e.target.dataset.si,n=+e.target.dataset.n;
    AN[i].s=AN[i].s===n?0:n;
    const row=document.querySelector(`.star-row[data-sb="${i}"]`);
    if(!row)return;
    row.querySelectorAll('[data-si]').forEach((s,j)=>{s.classList.toggle('on',AN[i].s>j);});
    const lbl=row.querySelector('.star-lbl');
    if(lbl)lbl.textContent=AN[i].s?AN[i].s+'/5 \u2014 '+SL[AN[i].s]:'';
  }));
  document.querySelectorAll('.scc').forEach(b=>b.addEventListener('click',e=>{
    const a=e.target.dataset.t==='a';
    if(a){SA=null;const c=document.getElementById('sga');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}
    else{SM=null;const c=document.getElementById('sgm');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}
  }));
  if(Ph==='results')setTimeout(()=>{initSig('sga',true);initSig('sgm',false);},80);
}

function render(){
  document.getElementById('app').innerHTML=Ph==='info'?riInf():Ph==='assess'?riAs():riRs();
  bind();
}

function dSt(doc,x,y,n){
  for(let i=0;i<5;i++){doc.setFillColor(...(i<n?[245,158,11]:[209,213,219]));doc.circle(x+i*4.8+2,y,1.9,'F');}
}
function pH(doc){
  try{doc.addImage('data:image/jpeg;base64,'+LG,'JPEG',13,5,55,17);}catch(e){}
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);
  doc.text('TEAM KNOWLEDGE ASSESSMENT',195,13,{align:'right'});
  doc.text(`${NM||'Team Member'}  |  ${GY_||''}  |  ${DT}`,195,18,{align:'right'});
  doc.setDrawColor(220,220,220);doc.line(13,24,197,24);
  return 29;
}

function mkPDF(){
  if(!window.jspdf){alert('PDF library loading, please try again in a moment.');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const M=13,CW=184;
  let y=pH(doc);
  doc.setFillColor(18,18,18);doc.roundedRect(M,y,CW,34,2,2,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text('TEAM KNOWLEDGE ASSESSMENT',M+7,y+11);
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.text('Ryderwear Gym  \u2014  Confidential Assessment Record',M+7,y+18);
  doc.setFontSize(9);doc.setTextColor(180,180,180);doc.text(DT,M+CW-4,y+18,{align:'right'});
  y+=42;
  const flds=[['Team member assessed',NM],['Assessor',AS],['Gym location',GY_],['Date completed',DT]];
  const fw=(CW-10)/2;
  flds.forEach(([l,v],i)=>{
    const fx=M+(i%2)*(fw+10);
    if(i%2===0&&i>0)y+=16;
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(140,140,140);doc.text(l.toUpperCase(),fx,y);
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text(v||'\u2014',fx,y+5);
    if(i===1)y+=14;
  });
  y+=20;doc.setDrawColor(220,220,220);doc.line(M,y,M+CW,y);y+=7;
  const acts=AN.map((a,i2)=>({...a,...AL[i2]})).filter(a=>a.s>0&&a.s<5).sort((a,b)=>a.s-b.s);
  const comp=AN.filter(a=>a.s===5).length;
  const rated=AN.filter(a=>a.s>0).length;
  [{l:'Questions Rated',v:`${rated}/${AL.length}`,bg:[242,242,242],fg:[40,40,40]},{l:'Fully Competent',v:String(comp),bg:[220,252,231],fg:[22,101,52]},{l:'Training Required',v:String(acts.length),bg:[254,243,199],fg:[113,63,18]}].forEach((b,i)=>{
    const bx=M+i*(61+1.5);
    doc.setFillColor(...b.bg);doc.roundedRect(bx,y,61,18,2,2,'F');
    doc.setTextColor(...b.fg);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(b.l,bx+30.5,y+6,{align:'center'});
    doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(b.v,bx+30.5,y+15,{align:'center'});
  });
  let fi=0;
  SC.forEach(sec=>{
    doc.addPage();y=pH(doc);
    const mg=sec.t.includes('Managers');
    doc.setFillColor(...(mg?[45,27,105]:[18,18,18]));doc.rect(M,y,CW,11,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text(sec.t.toUpperCase(),M+4,y+7.5);
    if(mg){doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Managers & 2IC Only',M+CW-2,y+7.5,{align:'right'});}
    y+=15;
    if(sec.note){doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(110,110,110);doc.text(sec.note,M,y);y+=6;}
    sec.q.forEach((q,qi)=>{
      if(y>258){doc.addPage();y=pH(doc);doc.setFillColor(...(mg?[45,27,105]:[18,18,18]));doc.rect(M,y,CW,8,'F');doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(sec.t.toUpperCase()+' (cont.)',M+3,y+5.5);y+=12;}
      const idx=fi++;const ans=AN[idx];
      const ql=doc.splitTextToSize(`${qi+1}.  ${q}`,CW-30);
      doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);doc.text(ql,M,y);
      dSt(doc,M+CW-26,y-1,ans.s);
      if(ans.s===0){doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(180,180,180);doc.text('not rated',M+CW-2,y,{align:'right'});}
      y+=ql.length*4.8+1;
      if(ans.c){doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(110,110,110);const cl=doc.splitTextToSize('Notes: '+ans.c,CW-8);doc.text(cl,M+4,y);y+=cl.length*4.2+1;}
      doc.setDrawColor(235,235,235);doc.line(M,y,M+CW,y);y+=4;
    });
  });
  if(acts.length>0){
    doc.addPage();y=pH(doc);
    doc.setFillColor(18,18,18);doc.rect(M,y,CW,12,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(12);doc.setFont('helvetica','bold');doc.text('TRAINING ACTION PLAN',M+4,y+8.5);y+=16;
    doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);doc.text('Areas requiring training, listed by priority. 1 star = most urgent.',M,y);y+=8;
    const pBg={1:[254,226,226],2:[254,243,199],3:[254,249,195],4:[219,234,254]};
    const pFg={1:[153,27,27],2:[113,63,18],3:[92,53,8],4:[29,78,216]};
    const pLb={1:'PRIORITY 1 \u2014 IMMEDIATE',2:'PRIORITY 2 \u2014 HIGH',3:'PRIORITY 3 \u2014 MEDIUM',4:'PRIORITY 4 \u2014 LOW'};
    acts.forEach(a=>{
      if(y>255){doc.addPage();y=pH(doc);}
      doc.setFillColor(...(pBg[a.s]||[240,240,240]));doc.rect(M,y,CW,8,'F');
      doc.setTextColor(...(pFg[a.s]||[80,80,80]));doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text(pLb[a.s],M+3,y+5.5);
      dSt(doc,M+CW-26,y+4,a.s);y+=11;
      doc.setFontSize(7.5);doc.setFont('helvetica','italic');doc.setTextColor(120,120,120);doc.text(a.sec.toUpperCase(),M,y);y+=4.5;
      doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(20,20,20);
      const ql=doc.splitTextToSize(a.q,CW);doc.text(ql,M,y);y+=ql.length*4.8+2;
      if(a.c){doc.setFontSize(8.5);doc.setFont('helvetica','italic');doc.setTextColor(100,100,100);const cl=doc.splitTextToSize('Assessor notes: '+a.c,CW-6);doc.text(cl,M+4,y);y+=cl.length*4.2+2;}
      doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(110,110,110);
      doc.text('Action / training required:',M,y);doc.setDrawColor(185,185,185);doc.line(M+41,y,M+CW,y);y+=5;
      doc.line(M,y,M+CW,y);y+=5;
      doc.text('Target completion date:',M,y);doc.line(M+38,y,M+78,y);
      doc.text('Responsible person:',M+82,y);doc.line(M+107,y,M+CW,y);y+=10;
      doc.setDrawColor(220,220,220);doc.line(M,y,M+CW,y);y+=5;
    });
  }
  doc.addPage();y=pH(doc);
  doc.setFillColor(18,18,18);doc.rect(M,y,CW,11,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('ASSESSOR OVERALL COMMENTS',M+4,y+7.5);y+=16;
  if(AC&&AC.trim()){
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(25,25,25);
    const acl=doc.splitTextToSize(AC.trim(),CW);doc.text(acl,M,y);y+=acl.length*5+8;
  }else{
    doc.setFillColor(248,248,248);doc.roundedRect(M,y,CW,36,2,2,'F');
    doc.setFontSize(9);doc.setFont('helvetica','italic');doc.setTextColor(180,180,180);doc.text('No comments entered.',M+CW/2,y+20,{align:'center'});y+=42;
  }
  if(y>228){doc.addPage();y=pH(doc);}else{doc.setDrawColor(220,220,220);doc.line(M,y,M+CW,y);y+=8;}
  doc.setFillColor(18,18,18);doc.rect(M,y,CW,11,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text('SIGN OFF',M+4,y+7.5);y+=16;
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);
  doc.text('By signing below, both parties confirm this assessment was conducted fairly and results have been discussed.',M,y,{maxWidth:CW});y+=10;
  const hw=(CW-12)/2;
  [['Assessor',AS,SA],['Team Member',NM,SM]].forEach(([role,nm,sig],i)=>{
    const bx=M+i*(hw+12);
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(30,30,30);doc.text(role,bx,y);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,100,100);doc.text(nm||'',bx,y+5);
    if(sig){try{doc.addImage(sig,'PNG',bx,y+9,hw,28);}catch(e){}}
    else{doc.setFillColor(248,248,248);doc.roundedRect(bx,y+9,hw,28,2,2,'F');}
    doc.setDrawColor(80,80,80);doc.line(bx,y+40,bx+hw,y+40);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(120,120,120);
    doc.text('Signature',bx,y+45);doc.text('Date: _______________',bx,y+51);
  });
  const pg=doc.internal.getNumberOfPages();
  for(let p=1;p<=pg;p++){
    doc.setPage(p);doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(160,160,160);
    doc.text(`Ryderwear Gym  |  ${NM}  |  ${GY_}  |  Page ${p} of ${pg}`,105,290,{align:'center'});
  }
  doc.save(`ryderwear-assessment-${(NM||'team').replace(/\s+/g,'-').toLowerCase()}.pdf`);
}

render();
</script>
